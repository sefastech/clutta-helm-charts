apiVersion: v2
name: clutta-scan
description: Clutta scan daemon. Runs on every node, watches logs and k8s state, fires findings to the Clutta backend.
type: application
# version + appVersion are managed by .github/workflows/release-clutta-incident.yml.
# Both values get rewritten from the release tag on every clutta-incident-v*
# push, so editing them here by hand is a no-op the next time CI runs. Don't.
#
#   version    = bare semver, ties one chart .tgz to one binary release
#                (e.g. 0.1.10 packages binary v0.1.10) so the chart .tgz is
#                immutable from helm's POV and never overwritten in-place
#   appVersion = full tag, mirrors the Docker Hub image tag exactly
version: 0.1.14
appVersion: "v0.1.14"
