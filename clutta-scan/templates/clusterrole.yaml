{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}
  labels:
    {{- include "clutta-scan.labels" . | nindent 4 }}
rules:
  # Discovery + Snapshot: list namespaces, list pods cluster-wide.
  - apiGroups: [""]
    resources: ["namespaces", "pods"]
    verbs: ["get", "list"]
  # Subscribe (logs): read container log content via the pod-log
  # subresource. This is what lets scan ingest logs through the API
  # (runtime-agnostic, no host /var/log mount). Pods are node-scoped in
  # code, so each DaemonSet pod only reads its own node's containers.
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  # Subscribe: poll events cluster-wide.
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list"]
  - apiGroups: ["events.k8s.io"]
    resources: ["events"]
    verbs: ["get", "list"]
{{- end -}}
