apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ .Release.Name }}
  labels:
    {{- include "clutta-scan.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "clutta-scan.selectorLabels" . | nindent 6 }}
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        {{- include "clutta-scan.labels" . | nindent 8 }}
      annotations:
        # Roll the DaemonSet when scan.yaml changes.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      {{- if .Values.rbac.create }}
      serviceAccountName: {{ .Release.Name }}
      {{- end }}
      {{- with .Values.image.pullSecret }}
      imagePullSecrets:
        - name: {{ . }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: scan
          image: "{{ .Values.image.repository }}:{{ include "clutta-scan.imageTag" . }}"
          imagePullPolicy: {{ include "clutta-scan.imagePullPolicy" . }}
          args:
            - scan
            - start
            - --foreground
            - --config
            - /etc/clutta/scan.yaml
          env:
            # CLUTTA_AUTH_PATH points the daemon's credential chain at the
            # mounted Secret directly. No bootstrap initContainer, no
            # emptyDir handoff, no HOME gymnastics: the file the Secret
            # exposes IS the file the daemon reads. The chain still falls
            # through to $HOME if this env var is unset, so the same image
            # works locally.
            - name: CLUTTA_AUTH_PATH
              value: /etc/clutta/auth.json
            - name: HOME
              value: /var/clutta
            {{- if .Values.env.maxInputBytes }}
            - name: CLUTTA_MAX_INPUT_BYTES
              value: {{ .Values.env.maxInputBytes | quote }}
            {{- end }}
            {{- if .Values.env.disableTelemetry }}
            - name: CLUTTA_NO_TELEMETRY
              value: "1"
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: host-logs
              mountPath: /var/log
              readOnly: true
            - name: scan-config
              mountPath: /etc/clutta/scan.yaml
              subPath: scan.yaml
              readOnly: true
            - name: credentials
              mountPath: /etc/clutta/auth.json
              subPath: {{ .Values.credentials.authJsonKey }}
              readOnly: true
            - name: clutta-state
              mountPath: /var/clutta
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: host-logs
          hostPath:
            path: {{ .Values.hostLogPath | quote }}
            type: DirectoryOrCreate
        - name: scan-config
          configMap:
            name: {{ .Release.Name }}-config
        - name: credentials
          secret:
            secretName: {{ .Values.credentials.existingSecretName }}
        - name: clutta-state
          emptyDir: {}
